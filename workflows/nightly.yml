#
# Nightly integration: trains small models and commits results.
# Triggered nightly at 02:00 UTC, or manually via workflow_dispatch.

name: Nightly Training

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC daily
  workflow_dispatch:
    inputs:
      scale:
        description: "Model scale to train"
        type: choice
        options: ["10M", "30M"]
        default: "10M"

jobs:
  nightly-train:
    name: Train Small Models & Compare
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download WikiText-103
        run: |
          mkdir -p data/wikitext-103
          python -c "
          from datasets import load_dataset
          import json
          ds = load_dataset('wikitext', 'wikitext-103-raw-v1', split='train')
          with open('data/wikitext-103/train.jsonl', 'w') as f:
              for ex in ds:
                  if ex['text'].strip():
                      f.write(json.dumps({'text': ex['text']}) + chr(10))
          "
      - name: Run nightly ablation
        run: |
          SCALE="${{ github.event.inputs.scale || '10M' }}"
          python experiments/run_ablation.py \
            --data_path data/wikitext-103/train.jsonl \
            --tokenizer_path gpt2 \
            --scale $SCALE \
            --epochs 2 \
            --seeds 42 43 \
            --batch_size 8 \
            --max_seq_len 512 \
            --output_dir results/nightly/$(date +%Y-%m-%d)
      - name: Commit results
        run: |
          git config user.name "uid-nightly-bot"
          git config user.email "noreply@github.com"
          git add results/nightly/
          if git diff --staged --quiet; then
            echo "No new results to commit"
          else
            git commit -m "nightly: results for $(date +%Y-%m-%d)"
            git push
          fi
