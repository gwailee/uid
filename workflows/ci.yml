#
# Continuous Integration for UID v2.0
#
# Runs on every push and PR:
#   - Linting (ruff)
#   - Type checking (mypy)
#   - Unit tests (pytest)
#   - Smoke tests on tiny models (CPU only)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
      - name: Run ruff
        run: ruff check uid_theory model experiments tests
      - name: Run black (check only)
        run: black --check --line-length 100 uid_theory model experiments tests

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run pytest
        run: |
          pytest tests/ -v --cov=uid_theory --cov=model \
            --cov-report=xml --cov-report=term --maxfail=5
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  smoke-test:
    name: Smoke Test (Tiny Model on CPU)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download WikiText-2 (small real corpus)
        run: |
          mkdir -p data/wikitext-2
          python -c "
          from datasets import load_dataset
          import json
          ds = load_dataset('wikitext', 'wikitext-2-raw-v1', split='train[:1000]')
          with open('data/wikitext-2/train.jsonl', 'w') as f:
              for ex in ds:
                  if ex['text'].strip():
                      f.write(json.dumps({'text': ex['text']}) + chr(10))
          "
      - name: Run tiny-model smoke test
        run: |
          python experiments/run_ablation.py \
            --data_path data/wikitext-2/train.jsonl \
            --tokenizer_path gpt2 \
            --scale 10M \
            --epochs 1 \
            --seeds 42 \
            --batch_size 4 \
            --max_seq_len 128 \
            --output_dir /tmp/smoke
      - name: Verify smoke results
        run: |
          test -f /tmp/smoke/results.json
          python -c "
          import json
          r = json.load(open('/tmp/smoke/results.json'))
          assert len(r) >= 5, f'Expected ≥5 ablation runs, got {len(r)}'
          print(f'Smoke test passed: {len(r)} ablation runs completed')
          "

  honest-claims-check:
    name: Verify Honest Claims in README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check KNOWN_LIMITATIONS.md exists
        run: test -f KNOWN_LIMITATIONS.md
      - name: Check ROADMAP.md exists
        run: test -f ROADMAP.md
      - name: Check README does not claim unverified results
        run: |
          # Fail if README claims "verified" without referencing real results
          if grep -i "verified\|proven\|demonstrated" README.md | \
             grep -v "to be verified\|pending\|not yet" | \
             grep -v "v0.1.*verified" > /tmp/suspicious.txt; then
            echo "Warning: README contains unqualified verification claims:"
            cat /tmp/suspicious.txt
            # Don't fail the build; just warn
          fi
          echo "Honest-claims check completed"
